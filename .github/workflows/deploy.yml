name: Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}

      - name: Build release binary
        working-directory: server
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Copy binary to VPS
        run: |
          scp server/target/x86_64-unknown-linux-gnu/release/signaling-server \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/signaling-server/signaling-server.new

      - name: Restart service
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            mv /opt/signaling-server/signaling-server.new /opt/signaling-server/signaling-server &&
            systemctl restart signaling-server"